<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SUPERXIZE 촬영 콜시트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#181818;
    --paper:#FAF8F3;
    --card:#FFFFFF;
    --yellow:#F2C230;
    --steel:#3A3D42;
    --steel-soft:#6b6f76;
    --red:#E4483C;
    --line:#E4E1D8;
    --green:#3C7A5A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    font-family:'Noto Sans KR',sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Noto Sans KR',sans-serif; font-weight:900; letter-spacing:-0.3px;}

  /* ---- Slate header ---- */
  .slate{ position:relative; background:var(--ink); color:var(--paper); overflow:hidden; padding:22px 20px 18px; }
  .slate::before{
    content:""; position:absolute; top:0; left:0; right:0; height:14px;
    background:repeating-linear-gradient(-45deg, var(--yellow) 0 22px, var(--ink) 22px 44px);
  }
  .slate-inner{ margin-top:16px; display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .slate-eyebrow{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2px; color:var(--yellow); text-transform:uppercase; }
  .slate-title{ font-family:'Noto Sans KR',sans-serif; font-weight:900; font-size:28px; letter-spacing:-0.5px; line-height:1.15; max-width:520px; word-break:break-word; }
  .slate-title[data-empty="true"]{color:#8b8b8b;}
  .slate-crew{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#b9b9b9; margin-top:6px; display:flex; gap:12px; flex-wrap:wrap; }
  .slate-crew b{ color:#e9e9e9; font-weight:500; }
  .slate-meta{ font-family:'JetBrains Mono',monospace; font-size:12px; color:#c9c9c9; display:flex; gap:14px; flex-wrap:wrap; }
  .slate-meta b{color:var(--yellow); font-weight:500;}
  .slate-edited{ font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a9a9a; margin-top:4px; }
  .slate-edited b{ color:#e7e7e7; font-weight:500; }
  .conn-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:1px; }
  .conn-dot.on{ background:#5FD98A; }
  .conn-dot.off{ background:#8a8a8a; }

  .project-bar{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; background:var(--steel); padding:10px 20px; }
  .project-bar select, .project-bar button, .project-bar input{ font-family:'Noto Sans KR',sans-serif; font-size:13px; }
  .project-bar select{ background:#2b2d31; color:#fff; border:1px solid #55585f; border-radius:6px; padding:9px 10px; max-width:220px; }
  .btn{ border:none; border-radius:6px; padding:10px 14px; font-size:13.5px; font-weight:500; cursor:pointer;
    transition:transform .08s ease, opacity .15s ease; font-family:'Noto Sans KR',sans-serif; min-height:40px; }
  .btn:active{transform:scale(0.97);}
  .btn-yellow{background:var(--yellow); color:#181818;}
  .btn-ghost{background:transparent; color:#fff; border:1px solid #6a6d74;}
  .btn-ghost:hover{background:#45484f;}
  .btn-red{background:transparent; color:#ff9d94; border:1px solid #7a4a46;}
  .btn-red:hover{background:#4a2e2c;}
  .btn-dark{background:var(--ink); color:#fff;}
  .btn-dark:hover{opacity:.85;}
  .btn-outline{background:#fff; color:var(--ink); border:1.5px solid var(--ink);}
  .btn-outline:hover{background:var(--ink); color:#fff;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .btn-sm{padding:7px 10px; font-size:12px; min-height:34px;}
  .btn-block{width:100%;}

  .layout{ display:grid; grid-template-columns: 1.3fr 1fr; gap:20px; max-width:1180px; margin:0 auto; padding:20px 20px 60px; align-items:start; }
  @media (max-width:880px){ .layout{grid-template-columns:1fr; padding:14px 12px 40px;} .slate-title{font-size:24px;} }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:18px 18px 20px; margin-bottom:16px; }
  .card h2{ font-family:'Noto Sans KR',sans-serif; font-weight:900; font-size:18px; margin:0 0 16px; display:flex; align-items:center; gap:10px; color:var(--ink); letter-spacing:-0.3px; }
  .card h2 .num{
    font-family:'Noto Sans KR',sans-serif; font-weight:900; font-size:13px; letter-spacing:0;
    color:#fff; background:var(--ink); border-radius:6px; padding:0;
    min-width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;}
  .field-row.single{grid-template-columns:1fr;}
  @media (max-width:520px){.field-row{grid-template-columns:1fr;}}
  label{ display:block; font-size:12px; color:var(--steel-soft); margin-bottom:5px; font-weight:500; }
  input[type=text], input[type=date], input[type=time], input[type=number], input[type=url], textarea, select.field{
    width:100%; padding:11px 11px; border:1.5px solid var(--line); border-radius:7px;
    font-family:'Noto Sans KR',sans-serif; font-size:16px; background:#fff; color:var(--ink);
  }
  input:focus, textarea:focus, select:focus{ outline:none; border-color:var(--ink); }
  textarea{resize:vertical; min-height:44px;}

  .settings-panel{ display:none; background:#2b2d31; border-top:1px solid #4a4d54; padding:12px 20px; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .settings-panel.open{display:flex;}
  .settings-field{display:flex; flex-direction:column; gap:4px;}
  .settings-field label{color:#c9c9c9; font-size:11px; margin:0;}
  .settings-field input{ background:#1f2124; border:1px solid #55585f; color:#fff; border-radius:6px; padding:9px 9px; font-size:14px; width:260px; }
  .settings-field input.mono{font-family:'JetBrains Mono',monospace;}
  .conn-status{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#c9c9c9; }
  @media (max-width:600px){ .settings-field input{ width:100%; } .settings-field{ width:100%; } }

  /* ---- rental shop cards ---- */
  .shop-card{ border:1px solid var(--line); border-radius:9px; padding:14px 14px 12px; margin-bottom:12px; background:#FCFBF8; position:relative; }
  .shop-card-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .shop-index{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--steel-soft); background:#EFECE3; padding:3px 8px; border-radius:5px;}
  .shop-card .field-row{margin-bottom:10px;}
  .shop-card .field-row:last-child{margin-bottom:0;}
  .empty-shops-hint{font-size:12.5px; color:#b0ada4; padding:8px 0 12px;}

  /* ---- equipment grouping ---- */
  .summary-bar{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
  .summary-chip{ font-family:'JetBrains Mono',monospace; font-size:11px; padding:6px 9px; border-radius:7px; background:#F5F3ED; border:1px solid var(--line); }
  .summary-chip b{font-weight:700;}
  .summary-chip.warn{background:#FDECC8; color:#8a5a00;}
  .summary-chip.ok{background:#DCEAE1; color:var(--green);}

  .group-block{ margin-top:8px; }
  .group-header{ font-family:'Noto Sans KR',sans-serif; font-weight:900; font-size:15px; margin:18px 0 6px; padding:6px 10px;
    background:var(--ink); color:#fff; border-radius:6px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .group-block:first-child .group-header{ margin-top:0; }
  .group-header .ghint{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--yellow); font-weight:500; }
  .subcat-header{ font-size:12px; font-weight:700; color:var(--steel-soft); margin:12px 0 2px; padding-left:2px; display:flex; align-items:center; gap:5px; }

  .list-row{ display:flex; gap:6px; align-items:flex-start; padding:11px 0; border-bottom:1px dashed var(--line); flex-wrap:wrap; }
  .list-row:last-child{border-bottom:none;}
  .row-main{ display:flex; flex-direction:column; gap:6px; flex:1; min-width:200px; }
  .row-top{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .row-name input{ border:none; background:transparent; padding:6px 4px; font-size:16px; flex:1; min-width:140px; }
  .row-name input:focus{background:#f5f4ef; border-radius:5px;}
  .row-sub{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .assignee-input{ width:130px; font-size:14px; padding:7px 8px; border:1px solid var(--line); border-radius:5px; background:#FAF9F5; }
  .assignee-input::placeholder{color:#c2bfb5;}
  .qty-group{display:flex; align-items:center; gap:4px;}
  .qty-group label{margin:0; font-size:10.5px; color:#b0ada4; white-space:nowrap;}
  .qty-input{ width:52px; text-align:center; padding:7px 2px; font-size:14px; font-family:'JetBrains Mono',monospace; }
  .subcat-select{ font-size:12.5px; padding:6px 6px; border:1px solid var(--line); border-radius:5px; background:#FAF9F5; color:var(--steel-soft); }
  .row-meta{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#c2bfb5; margin-top:1px; }
  .row-actions{display:flex; align-items:center; gap:2px; margin-top:5px;}
  .icon-btn{ background:none; border:none; color:#b8b5ac; cursor:pointer; font-size:18px; padding:6px 8px; line-height:1; }
  .icon-btn:hover{color:var(--red);}

  .add-row{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; align-items:center;}
  .add-row input, .add-row select{flex:1; min-width:110px;}
  .add-row .assignee-input{flex:0 0 120px; min-width:100px;}
  .add-row .qty-input{flex:0 0 56px; min-width:50px;}
  .add-row .group-select, .add-row .subcat-select-add{flex:1 1 140px; min-width:120px; padding:11px; border:1.5px solid var(--line); border-radius:7px; font-size:14px; background:#fff;}
  @media (max-width:600px){
    .add-row input, .add-row select{ flex:1 1 100%; }
  }
  .seg{display:flex; border:1.5px solid var(--line); border-radius:7px; overflow:hidden;}
  .seg button{ border:none; background:#fff; padding:10px 12px; font-size:12.5px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; color:var(--steel-soft); min-height:40px; }
  .seg button.active.rental{background:#FDECC8; color:#9a6b00; font-weight:700;}
  .seg button.active.personal{background:#DCEAE1; color:var(--green); font-weight:700;}
  #statusFilterSeg{border-color:#5a5d63;}
  #statusFilterSeg button{background:#2b2d31; color:#c9c9c9; padding:8px 12px; font-size:12px; min-height:36px;}
  #statusFilterSeg button.active{background:var(--yellow); color:#181818; font-weight:700;}
  .status-badge{ font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:5px 12px; border-radius:20px; letter-spacing:.5px; border:none; cursor:pointer; }
  .status-badge.ongoing{background:#2e5c46; color:#8fe3b8;}
  .status-badge.done{background:#4a4d54; color:#c9c9c9;}

  .empty-hint{font-size:12.5px; color:#b0ada4; padding:6px 0;}

  .check-row{display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line); flex-wrap:wrap;}
  .check-row:last-child{border-bottom:none;}
  .check-row input[type=checkbox]{width:20px; height:20px; accent-color:var(--ink); flex-shrink:0; margin-top:6px;}
  .check-row.done .row-name input{color:#b0ada4; text-decoration:line-through;}

  .sticky{position:sticky; top:16px;}
  .preview-box{
    background:#181818; color:#e9e7e0; border-radius:10px; padding:16px;
    font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.65;
    white-space:pre-wrap; word-break:break-word; max-height:420px; overflow-y:auto; border:1px solid #2c2c2c;
  }
  .target-row{display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap;}
  .target-row select{ flex:1; padding:11px 10px; border:1.5px solid var(--line); border-radius:7px; font-size:14.5px; min-width:140px; }
  .share-actions{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .share-actions .btn{flex:1; min-width:130px;}
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:20px; font-size:13.5px;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
    z-index:50; font-family:'Noto Sans KR',sans-serif; max-width:90vw; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:#3a3a3a; border-radius:4px;}

  @media (max-width:420px){
    .card{padding:14px 14px 16px;}
    .slate-title{font-size:20px;}
    .btn{padding:10px 12px; font-size:13px;}
  }
</style>
</head>
<body>

<div class="slate">
  <div class="project-bar">
    <div class="seg" id="statusFilterSeg">
      <button type="button" class="active" data-filter="all">전체</button>
      <button type="button" data-filter="ongoing">진행중</button>
      <button type="button" data-filter="done">종료</button>
    </div>
    <select id="projectSelect" class="mono"></select>
    <button class="btn btn-ghost btn-sm" id="newProjectBtn">+ 새 촬영</button>
    <button class="btn btn-red btn-sm" id="deleteProjectBtn">삭제</button>
    <button class="btn btn-ghost btn-sm" id="settingsBtn" style="margin-left:auto;">⚙ 설정</button>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-field">
      <label>백엔드 URL (Apps Script 웹앱 .../exec)</label>
      <input type="url" id="s_backendUrl" class="mono" placeholder="https://script.google.com/macros/s/xxxx/exec">
    </div>
    <div class="settings-field">
      <label>내 이름 (수정자 표시용)</label>
      <input type="text" id="s_myName" placeholder="예) 김영재">
    </div>
    <button class="btn btn-yellow btn-sm" id="saveSettingsBtn">저장</button>
    <span class="conn-status" id="connStatus"><span class="conn-dot off"></span>로컬 전용 모드</span>
  </div>
  <div class="slate-inner">
    <div>
      <div class="slate-eyebrow">SUPERXIZE · CALL SHEET</div>
      <div class="slate-title" id="slateTitle" data-empty="true">촬영 제목을 입력하세요</div>
      <div class="slate-crew" id="slateCrew"></div>
      <div class="slate-edited" id="slateEdited"></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
      <button type="button" class="status-badge ongoing" id="statusToggleBtn">진행중</button>
      <div class="slate-meta">
        <span>일정 <b id="metaDate">-</b></span>
      </div>
    </div>
  </div>
</div>

<div class="layout">
  <div>

    <div class="card">
      <h2><span class="num">1</span> 촬영 정보</h2>
      <div class="field-row single"><div><label>프로젝트/촬영명</label><input type="text" id="f_title" placeholder="예) 촬영명"></div></div>
      <div class="field-row single"><div><label>촬영 장소</label><input type="text" id="f_location" placeholder="예) OO스튜디오, 서울 성동구 ..."></div></div>
      <div class="field-row">
        <div><label>프로덕션</label><input type="text" id="f_production" placeholder="예) SUPERXIZE"></div>
        <div><label>연출 감독</label><input type="text" id="f_director" placeholder="감독 이름"></div>
      </div>
      <div class="field-row">
        <div><label>촬영감독</label><input type="text" id="f_cinematographer" placeholder="촬영감독 이름"></div>
        <div><label>조감독</label><input type="text" id="f_adDirector" placeholder="조감독 이름"></div>
      </div>
      <div class="field-row">
        <div><label>PD</label><input type="text" id="f_pd" placeholder="PD 이름"></div>
        <div></div>
      </div>
    </div>

    <div class="card">
      <h2><span class="num">2</span> 촬영 일정</h2>
      <div class="empty-hint" style="margin-top:-8px; margin-bottom:10px;">하루짜리 촬영이면 1개, 2~3일 연속 또는 징검다리 일정이면 날짜를 필요한 만큼 추가하세요.</div>
      <div id="shootDayList"></div>
      <div class="empty-hint" id="shootDayEmptyHint">등록된 촬영일이 없습니다.</div>
      <button class="btn btn-outline btn-block" id="addShootDayBtn">+ 촬영일 추가</button>
    </div>

    <div class="card">
      <h2><span class="num">3</span> 장비체크 일정</h2>
      <div class="field-row">
        <div><label>일시</label><input type="datetime-local" id="f_checkDatetime"></div>
        <div><label>집합 장소</label><input type="text" id="f_checkPlace" placeholder="예) OO렌탈 창고"></div>
      </div>
      <div class="field-row single">
        <div><label>주소</label>
          <div style="display:flex; gap:8px;">
            <input type="text" id="f_checkAddress" placeholder="예) 서울 마포구 ..." style="flex:1;">
            <button type="button" class="btn btn-outline btn-sm" id="checkAddressSearchBtn" style="white-space:nowrap;">🔍 주소 검색</button>
            <a href="#" target="_blank" rel="noopener" class="btn btn-outline btn-sm" id="checkAddressMapsLink" style="white-space:nowrap; display:none;">🗺 네이버지도</a>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2><span class="num">4</span> 렌탈샵 · 장비 반출</h2>
      <div id="shopList"></div>
      <div class="empty-shops-hint" id="shopEmptyHint">등록된 렌탈샵이 없습니다.</div>
      <button class="btn btn-outline btn-block" id="addShopBtn">+ 렌탈샵 추가</button>
    </div>

    <div class="card">
      <h2><span class="num">5</span> 장비 리스트</h2>
      <div class="summary-bar" id="equipSummary"></div>
      <div id="equipGroups"></div>
      <div class="empty-hint" id="equipEmptyHint">아직 등록된 장비가 없습니다.</div>
      <div class="add-row" style="flex-direction:column; align-items:stretch;">
        <input type="text" id="equipNameInput" placeholder="장비명 (예: FX6 카메라)">
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <span class="qty-group"><label>수량</label><input type="text" id="equipQtyNeededInput" class="qty-input" value="1"></span>
          <select id="equipSubCatSelect" class="subcat-select-add" style="flex:1 1 130px;"></select>
          <select id="equipGroupSelect" class="group-select" style="flex:1 1 130px;"></select>
          <button class="btn btn-dark" id="addEquipBtn" style="flex:0 0 auto;">추가</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2><span class="num">6</span> 체크리스트</h2>
      <div id="checklist"></div>
      <div class="add-row">
        <input type="text" id="checkItemInput" placeholder="체크리스트 항목 추가">
        <input type="text" id="checkAssigneeInput" class="assignee-input" placeholder="담당자">
        <button class="btn btn-dark" id="addCheckBtn">추가</button>
      </div>
    </div>

  </div>

  <div class="sticky">
    <div class="card">
      <h2><span class="num">7</span> 카카오톡 공유 미리보기</h2>
      <div class="target-row">
        <label style="margin:0; white-space:nowrap;">보낼 대상</label>
        <select id="targetSelect"><option value="__all__">전체 공지용</option></select>
      </div>
      <div class="preview-box" id="previewBox"></div>
      <div class="share-actions">
        <button class="btn btn-outline" id="copyBtn">📋 텍스트 복사</button>
        <button class="btn btn-yellow" id="shareBtn">📤 공유하기</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
(function(){
  var LS_SETTINGS = 'superxize_callsheet_settings_v1';
  var LS_LOCAL_STORE = 'superxize_callsheet_local_v3';

  var SUBCATS = [
    { id:'body', label:'바디', icon:'📷' },
    { id:'tripod', label:'삼각대', icon:'🛠' },
    { id:'gimbal', label:'짐벌', icon:'🎛' },
    { id:'lens', label:'렌즈', icon:'🔎' },

  function fmtDate(d){ if(!d) return ''; var parts=String(d).split(/[-T]/); if(parts.length<3) return d; return parts[0]+'.'+parts[1]+'.'+parts[2]; }
  function dateOnly(dtLocal){ if(!dtLocal) return ''; return String(dtLocal).split('T')[0]; }
  var KOREAN_WEEKDAYS = ['일','월','화','수','목','금','토'];
  function fmtKoreanDate(dateStr){
    if(!dateStr) return '';
    var d = new Date(dateStr+'T00:00:00');
    if(isNaN(d.getTime())) return '';
    return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+KOREAN_WEEKDAYS[d.getDay()]+')';
  }
  function fmtKoreanTime(timeStr){
    if(!timeStr) return '';
    var parts = timeStr.split(':');
    var h = parseInt(parts[0],10), mi = parts[1] || '00';
    if(isNaN(h)) return '';
    var ampm = h < 12 ? '오전' : '오후';
    var h12 = h % 12; if(h12===0) h12 = 12;
    return ampm+' '+h12+':'+mi;
  }
  function addDays(dateStr, n){
    if(!dateStr) return '';
    var d = new Date(dateStr+'T00:00:00');
    if(isNaN(d.getTime())) return '';
    d.setDate(d.getDate()+n);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function fmtKoreanDateTime(dtLocal){
    if(!dtLocal) return '';
    var d = new Date(dtLocal);
    if(isNaN(d.getTime())) return '';
    var y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
    var h = d.getHours(), mi = d.getMinutes();
    var ampm = h < 12 ? '오전' : '오후';
    var h12 = h % 12; if(h12===0) h12 = 12;
    var miStr = String(mi).padStart(2,'0');
    return y+'년 '+m+'월 '+day+'일 '+ampm+' '+h12+':'+miStr;
  }
  function fmtDateTime(iso){
    if(!iso) return '';
    var d = new Date(iso);
    if(isNaN(d.getTime())) return '';
    var mm = String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
    var hh = String(d.getHours()).padStart(2,'0'), mi=String(d.getMinutes()).padStart(2,'0');
    return mm+'/'+dd+' '+hh+':'+mi;
  }

      clearTimeout(debounceTimers[item.id]);

          id:item.id, name:item.name, groupId:item.groupId, subCat:item.subCat,
          qtyNeeded:item.qtyNeeded
        }).then(function(updatedProj){
          if(updatedProj){
            current = updatedProj;

  // ---------------- share target + preview ----------------
  function uniqueAssignees(){
    var p = current;
    var set = {};
    p.checklist.forEach(function(c){ if(c.assignee && c.assignee.trim()) set[c.assignee.trim()]=true; });
    p.rentalShops.forEach(function(s){ if(s.pickupPerson && s.pickupPerson.trim()) set[s.pickupPerson.trim()]=true; });
    return Object.keys(set).sort();
  }
  function renderTargetSelect(){
    var prev = els.targetSelect.value || '__all__';
    els.targetSelect.innerHTML = '<option value="__all__">전체 공지용</option>';
    uniqueAssignees().forEach(function(name){
      var opt = document.createElement('option'); opt.value = name; opt.textContent = name + ' 개인용';
      els.targetSelect.appendChild(opt);
    });
    var stillExists = Array.prototype.some.call(els.targetSelect.options, function(o){ return o.value===prev; });
    els.targetSelect.value = stillExists ? prev : '__all__';
  }
  els.targetSelect.addEventListener('change', renderPreview);

  function buildShareText(){
    var p = current;
    var target = els.targetSelect.value;
    var forAll = target === '__all__';
    var lines = [];
    lines.push('🎬 ' + (p.title || '촬영') + ' 촬영 안내' + (forAll ? '' : ' (' + target + '님 개인용)'));
    lines.push('');
    var crewBits = [];
    if(p.production) crewBits.push('프로덕션 ' + p.production);
    if(p.director) crewBits.push('감독 ' + p.director);
    if(p.cinematographer) crewBits.push('촬영감독 ' + p.cinematographer);
    if(p.adDirector) crewBits.push('조감독 ' + p.adDirector);
    if(p.pd) crewBits.push('PD ' + p.pd);
    if(crewBits.length) lines.push('👤 ' + crewBits.join(' / '));
    lines.push('📍 촬영 장소: ' + (p.location || '-'));
    lines.push('');
    lines.push('📅 촬영 일정');
    var sortedDays = p.shootDays.slice().sort(function(a,b){ return (a.date||'').localeCompare(b.date||''); });
    if(sortedDays.length){
      sortedDays.forEach(function(day, idx){
        var dLabel = day.date ? fmtKoreanDate(day.date) : '(날짜 미정)';
        var callLabel = day.callTime ? fmtKoreanTime(day.callTime) : '-';
        var wrapLabel = day.wrapTime ? fmtKoreanTime(day.wrapTime) + (day.overnight ? ' (익일)' : '') : '-';
        lines.push((idx+1) + '일차: ' + dLabel + (day.note ? '  ['+day.note+']' : ''));
        lines.push('   집합 ' + callLabel + '   /   종료 ' + wrapLabel);
      });
    } else {
      lines.push('- (미정)');
    }
    lines.push('');

    if(p.rentalShops.length){
      p.rentalShops.forEach(function(shop, idx){
        if(!forAll && shop.pickupPerson && shop.pickupPerson.trim()!==target) return;
        lines.push('🏬 렌탈샵 ' + (idx+1) + ': ' + (shop.name || '-') + (shop.contact ? ' (' + shop.contact + ')' : ''));
        if(shop.address){
          lines.push('📍 주소: ' + shop.address + '  (지도: ' + naverMapUrl(shop.address) + ')');
        }
        lines.push('🚚 반출: ' + (shop.pickupDatetime ? fmtKoreanDateTime(shop.pickupDatetime) : '-') + (shop.returnDatetime ? '   /   반납: ' + fmtKoreanDateTime(shop.returnDatetime) : '') + (shop.pickupPerson ? '   /   담당: ' + shop.pickupPerson : ''));
      });
      lines.push('');
    }

    lines.push('🔧 장비체크 일시: ' + (p.checkDatetime ? fmtKoreanDateTime(p.checkDatetime) : '-'));
    lines.push('   집합장소: ' + (p.checkPlace || '-'));
    if(p.checkAddress){
      lines.push('📍 주소: ' + p.checkAddress + '  (지도: ' + naverMapUrl(p.checkAddress) + ')');
    }
    lines.push('');

    var equip = p.equipment;
    lines.push('🎥 장비 리스트');
    var groupsAll = current.rentalShops.map(function(s){ return { id:s.id, label:s.name || '(이름없는 렌탈샵)' }; }).concat([{ id:'personal', label:'개인장비' }]);
    var anyPrinted = false;
    groupsAll.forEach(function(g){
      var gItems = equip.filter(function(e){ return (e.groupId||'personal')===g.id; });
      if(!gItems.length) return;
      anyPrinted = true;
      lines.push('[' + g.label + ']');
      SUBCATS.forEach(function(sc){
        var scItems = gItems.filter(function(e){ return normSubCat(e.subCat)===sc.id; });
        if(!scItems.length) return;
        lines.push(sc.icon + ' ' + sc.label);
        scItems.forEach(function(e){
          var qty = e.qtyNeeded ? (' x' + e.qtyNeeded) : '';
          lines.push('- ' + e.name + qty);
        });
      });
    });
    if(!anyPrinted) lines.push('- (없음)');
    lines.push('');

    var checks = forAll ? p.checklist : p.checklist.filter(function(c){ return !c.assignee || c.assignee.trim()===target; });
    lines.push('✅ 체크리스트' + (forAll ? '' : ' (본인 담당 + 공통)'));
    if(checks.length){
      checks.forEach(function(c){ lines.push((c.done ? '☑ ' : '☐ ') + c.text + (forAll && c.assignee ? '  [담당: ' + c.assignee + ']' : '')); });
    } else { lines.push('- (없음)'); }

    return lines.join('\n');
  }

  function renderPreview(){ els.previewBox.textContent = buildShareText(); }

  }
  [
    ['title','title'], ['location','location'],
    ['production','production'], ['director','director'], ['cinematographer','cinematographer'], ['adDirector','adDirector'], ['pd','pd'],
    ['checkDatetime','checkDatetime'], ['checkPlace','checkPlace'], ['checkAddress','checkAddress']
  ].forEach(function(pair){
    els[pair[0]].addEventListener('input', function(){
      current[pair[1]] = els[pair[0]].value;
      if(['title','production','director','cinematographer','adDirector','pd'].indexOf(pair[1])>-1){ renderSlate(); }
      scheduleProjectSave();
      renderPreview();
    });
  });
  els.checkAddress.addEventListener('input', function(){
    if(current.checkAddress && current.checkAddress.trim()){
      els.checkAddressMapsLink.href = naverMapUrl(current.checkAddress);
      els.checkAddressMapsLink.style.display = 'inline-block';
    } else {
      els.checkAddressMapsLink.style.display = 'none';
    }
  });
  els.checkAddressSearchBtn.addEventListener('click', function(){
    openAddressSearch(els.checkAddress);
  });

  function refreshProjectListQuiet(){ api.listProjects().then(function(list){ renderProjectSelect(list); }); }

  // ---------------- equipment / checklist add ----------------
  function addEquipment(){
    var name = els.equipNameInput.value.trim();
    if(!name){ els.equipNameInput.focus(); return; }
    var qtyNeeded = els.equipQtyNeededInput.value.trim() || '1';
    var groupId = els.equipGroupSelect.value || 'personal';
    var subCat = els.equipSubCatSelect.value || 'etc';
    var newItem = { id: uid(), name:name, groupId:groupId, subCat:subCat, qtyNeeded:qtyNeeded, updatedBy: editorName(), updatedAt: nowIso() };
    current.equipment.push(newItem);
    els.equipNameInput.value=''; els.equipQtyNeededInput.value='1';
    els.equipNameInput.focus();
    renderEquipment(); renderTargetSelect(); renderPreview();
    api.saveEquipment(current.id, newItem).catch(function(){ showToast('저장에 실패했어요. 연결을 확인해주세요'); });
  }
  els.addEquipBtn.addEventListener('click', addEquipment);
  [els.equipNameInput, els.equipQtyNeededInput].forEach(function(inp){
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter') addEquipment(); });
  });

  function addCheckItem(){
    var text = els.checkItemInput.value.trim();
    if(!text){ els.checkItemInput.focus(); return; }
    var assignee = els.checkAssigneeInput.value.trim();
    var newItem = { id: uid(), text:text, done:false, assignee:assignee, updatedBy: editorName(), updatedAt: nowIso() };
    current.checklist.push(newItem);
    els.checkItemInput.value=''; els.checkAssigneeInput.value='';
    els.checkItemInput.focus();
    renderChecklist(); renderTargetSelect(); renderPreview();
    api.saveChecklist(current.id, newItem).catch(function(){ showToast('저장에 실패했어요. 연결을 확인해주세요'); });
  }
  els.addCheckBtn.addEventListener('click', addCheckItem);
  [els.checkItemInput, els.checkAssigneeInput].forEach(function(inp){
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter') addCheckItem(); });
  });

  // ---------------- project management ----------------
  els.projectSelect.addEventListener('change', function(){
    currentId = els.projectSelect.value;
    if(!isRemote()){ localStore.currentId = currentId; saveLocalStore(localStore); }
    loadCurrent();
  });
  els.newProjectBtn.addEventListener('click', function(){
    var blank = blankProject();
    api.saveProject({
      id:'', title:'', location:'', status:'ongoing',
      production:'', director:'', cinematographer:'', adDirector:'', pd:'',
      checkDatetime:'', checkPlace:'', checkAddress:''
    }).then(function(updatedProj){
      if(updatedProj){
        currentId = updatedProj.id;
        var checklistSeeds = DEFAULT_CHECKLIST();
        var dayId = uid();
        var chain = Promise.resolve();
        chain = chain.then(function(){ return api.saveShootDay(currentId, {id:dayId, date:'', callTime:'', wrapTime:'', overnight:false, note:''}); });
        checklistSeeds.forEach(function(s){
          chain = chain.then(function(){ return api.saveChecklist(currentId, {id:s.id, text:s.text, done:false, assignee:''}); });
        });
        chain.then(function(){ return api.getProject(currentId); }).then(function(full){
          current = full || updatedProj;
          refreshProjectListQuiet(); renderForm(); els.title.focus();
          showToast('새 촬영이 생성되었습니다');
        });
      } else {
        localStore.projects.push(blank);
        localStore.currentId = blank.id;
        currentId = blank.id;
        saveLocalStore(localStore);
        current = blank;
        refreshProjectListQuiet(); renderForm(); els.title.focus();
        showToast('새 촬영이 생성되었습니다');
      }
    });
  });
  els.deleteProjectBtn.addEventListener('click', function(){
    api.listProjects().then(function(list){
      if(list.length <= 1){ showToast('마지막 촬영은 삭제할 수 없습니다'); return; }
      if(!confirm('현재 촬영 정보를 삭제할까요? 되돌릴 수 없습니다.')) return;
      api.deleteProject(currentId).then(function(){
        api.listProjects().then(function(list2){
          currentId = list2[0].id;
          if(!isRemote()){ localStore.currentId = currentId; saveLocalStore(localStore); }
          loadCurrent();
          showToast('삭제되었습니다');
        });
      });
    });
  });

  // ---------------- share ----------------
  els.copyBtn.addEventListener('click', function(){
    var text = buildShareText();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ showToast('복사되었습니다 · 카카오톡에 붙여넣기 하세요'); }).catch(function(){ fallbackCopy(text); });
    } else { fallbackCopy(text); }
  });
  function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); showToast('복사되었습니다'); } catch(e){ showToast('복사에 실패했습니다'); }
    document.body.removeChild(ta);
  }
  els.shareBtn.addEventListener('click', function(){
    var text = buildShareText();
    if(navigator.share){ navigator.share({ title:(current.title || '촬영 콜시트'), text:text }).catch(function(){}); }
    else { els.copyBtn.click(); showToast('이 브라우저는 공유하기를 지원하지 않아 텍스트를 복사했습니다'); }
  });

  // ---------------- polling (remote mode) ----------------
  function isTypingSomewhere(){
    var el = document.activeElement;
    return el && (el.tagName==='INPUT' || el.tagName==='TEXTAREA' || el.tagName==='SELECT');
  }
  function startPolling(){
    if(!isRemote()) return;
    setInterval(function(){
      if(!currentId || isTypingSomewhere()) return;
      api.getProject(currentId).then(function(fresh){
        if(fresh && fresh.lastEditedAt !== (current && current.lastEditedAt)){ current = fresh; renderForm(); }
      });
    }, 8000);
  }

  // ---------------- bootstrap ----------------
  function loadCurrent(){
    api.getProject(currentId).then(function(p){ current = p || blankProject(); renderForm(); });
  }
  function bootstrap(){
    api.listProjects().then(function(list){
      if(!list.length){
        if(isRemote()){ els.newProjectBtn.click(); return; }
        list = [{ id: localStore.projects[0].id }];
      }
      currentId = currentId && list.some(function(p){return p.id===currentId;}) ? currentId : list[0].id;
      renderProjectSelect(list);
      loadCurrent();
    });
  }

  bootstrap();
  startPolling();
})();
</script>
</body>
</html>
